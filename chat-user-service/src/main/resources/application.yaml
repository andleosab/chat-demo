# monitoring
management:
    endpoints:
        web:
            exposure:
                include: "info,health"

# default settings if no profiles provided
logging:
  config: classpath:logback-spring.xml
#  file: ./logs/service.log
#  level:
#    root: ${LOGBACK_ROOT_LEVEL:INFO}
#    reactor.netty.http.client.HttpClient: DEBUG  
#    org.hibernate.SQL: DEBUG
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE    
    
server:
    port: ${SERVER_PORT:8080}
    use-forward-headers: true
    servlet:
        register-default-servlet: true
        context-path: /user
    ssl:
        enabled: false
    http:
        log-request-details: true

spring:
  mvc:
     log-request-details: false
  servlet:
     multipart:
       max-file-size: 10MB
       max-request-size: 10MB   
       
  autoconfigure:
     exclude: 
        - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
        - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
#    hikari:
#       # minimum number of idle connections maintained by HikariCP in a connection pool    
#       minimumIdle: 5
#       # maximum pool size 
#       maximumPoolSize: 25
#       # maximum number of milliseconds that a client will wait for a connection (default)
#       connectionTimeout: 10000 
#       # maximum idle time for connection (default)
#       idleTimeout: 600000
#       # maximum lifetime in milliseconds of a connection in the pool after it is closed. (default)
#       maxLifetime: 1800000    
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true	
  sql:
    init: 
      mode: always	      

  jackson:
    deserialization:
      fail-on-unknown-properties: true
      
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 1

app.jwt.secret: ${JWT_SECRET}

kafka:
  topic:
    user-created: user.created             

---

spring:
  config:
    activate:
      on-profile: ST,PR

    jpa:
        generate-ddl: false
        open-in-view: false
        show-sql: false
        hibernate:
            ddl-auto: none
